name: CI

on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libreadline-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja readline

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export R_HOME="$(R RHOME)"
          cmake -B build -G Ninja

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rHome = (R.exe RHOME) | Out-String
          $rHome = $rHome.Trim()
          $env:R_HOME = $rHome
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DR_HOME="$rHome"

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export R_HOME="$(R RHOME)"
          cmake --build build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release

      - name: Test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export R_HOME="$(R RHOME)"
          ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rHome = (R.exe RHOME) | Out-String
          $rHome = $rHome.Trim()
          $env:R_HOME = $rHome
          $env:PATH = "$rHome\bin\x64;$env:PATH"
          ctest --test-dir build --output-on-failure -C Release
